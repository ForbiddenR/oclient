name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  package:
    name: Package (windows)
    needs: validate
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Package app
        run: npm run dist

      - name: Copy compiled files to release folder
        shell: bash
        run: |
          mkdir -p release/dist
          cp -r dist/. release/dist/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: oclient-windows-installer
          path: release/*-installer-*.exe
          if-no-files-found: error

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: oclient-windows-portable
          path: release/*-portable-*.exe
          if-no-files-found: error

      - name: Upload compiled files
        uses: actions/upload-artifact@v4
        with:
          name: oclient-compiled
          path: release/dist/**
          if-no-files-found: error
